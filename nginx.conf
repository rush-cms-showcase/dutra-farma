server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Fallback to index.html for SPA/SSG routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache CSS, JS, and Fonts for 1 Year (Immutable)
    # The /_astro/ folder contains uniquely hashed chunks, making them safe to cache indefinitely
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|svgz)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Cache Images and Media for 1 Month
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|mp4|ogg|ogv|webm|htc|webp|avif)$ {
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Disable Cache for HTML and JSON to ensure fresh content
    location ~* \.(?:manifest|appcache|html?|xml|json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
